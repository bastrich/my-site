name: Deploy

on:
  workflow_dispatch:

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6.1.0
        with:
          node-version: '20'

      - name: Install minify/obfuscate tools
        run: |
          npm install -g html-minifier-terser clean-css-cli terser javascript-obfuscator

      - name: Prepare dist directory
        run: |
          rm -rf dist
          mkdir dist
          mkdir dist/perfect-code-review
          cp -R img dist
          cp -R perfect-code-review/img dist/perfect-code-review/img
          cp favicon.ico dist
          cp favicon.svg dist
          cp robots.txt dist
          cp sitemap.xml dist

      - name: Minify HTML
        run: |
          for file in "index.html" "perfect-code-review/index.html"; do
            html-minifier-terser \
            --collapse-whitespace \
            --remove-comments \
            --remove-redundant-attributes \
            --remove-script-type-attributes \
            --remove-style-link-type-attributes \
            --use-short-doctype \
            --minify-css true \
            --minify-js true \
            "$file" -o "dist/$file"
          done

      - name: Minify CSS
        run: |
          cleancss -o "dist/style.css" "style.css"

      - name: Minify and obfuscate JS
        run: |
          for file in "index.js" "perfect-code-review/image-modal.js"; do
            terser "$file" -c -m -o "dist/$file"
            javascript-obfuscator "dist/$file" --output "dist/$file"
          done

      - name: Upload to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./dist/
          server-dir: ./
          dangerous-clean-slate: true